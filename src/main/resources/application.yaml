spring:
  application:
    name: image-processing-service
  profiles:
    active: local

  datasource:
    url: jdbc:mysql://localhost:3306/image_processing_db
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  servlet:
    multipart:
      max-file-size: 15MB
      max-request-size: 15MB

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false

jwt:
  secret: ${JWT_SECRET}

server:
  port: 8081

aws:
  access-key: ${AWS_ACCESS_KEY}
  secret-key: ${AWS_SECRET_KEY}
  region: ap-south-1
  bucket-name: ${AWS_BUCKET_NAME}
